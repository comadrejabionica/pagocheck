<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PagoCheck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:#2a2a3d;
    --accent:#00e5a0; --accent2:#7c6bff; --warn:#ff6b6b;
    --text:#e8e8f0; --muted:#6b6b8a;
    --mono:'DM Mono',monospace; --sans:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

  /* LOGIN */
  #screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a1a3a 0%,var(--bg) 70%);}
  .login-box{width:100%;max-width:400px;padding:48px 40px;background:var(--surface);border:1px solid var(--border);border-radius:16px;position:relative;overflow:hidden;margin:16px;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
  .login-logo{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;}
  .login-logo span{color:var(--accent);}
  .login-sub{color:var(--muted);font-size:12px;margin-bottom:32px;font-family:var(--mono);}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .form-group input,.form-group select{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;transition:border-color .2s;}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);}
  .form-group select option{background:var(--surface2);}
  .btn-primary{width:100%;padding:14px;background:var(--accent);border:none;border-radius:8px;color:#000;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;}
  .btn-primary:hover{opacity:.9;}
  .btn-primary:active{transform:scale(.98);}
  .login-error{color:var(--warn);font-size:12px;font-family:var(--mono);margin-top:10px;display:none;}

  /* APP */
  #screen-app{display:none;flex-direction:column;min-height:100vh;}
  .topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
  .topbar-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .topbar-logo span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .topbar-user{font-size:12px;font-family:var(--mono);color:var(--muted);}
  .topbar-role{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--accent2);}
  .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-logout:hover{border-color:var(--warn);color:var(--warn);}
  .main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%;}

  /* STATS */
  .sv-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
  .stat-card.green::after{background:var(--accent);}
  .stat-card.purple::after{background:var(--accent2);}
  .stat-card.blue::after{background:#4fc3f7;}
  .stat-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
  .stat-value{font-size:26px;font-weight:800;letter-spacing:-1px;}
  .stat-value.green{color:var(--accent);}
  .stat-value.purple{color:var(--accent2);}
  .stat-value.blue{color:#4fc3f7;}

  /* SECTION */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
  .live-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:1px;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

  /* PAYMENT CARDS */
  .payments-list{display:flex;flex-direction:column;gap:10px;}
  .payment-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:background .3s;animation:slideIn .3s ease;}
  .payment-card.pending{border-left:3px solid var(--accent2);}
  .payment-card.released{border-left:3px solid var(--accent);opacity:.65;}
  .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .status-dot.pending{background:var(--accent2);animation:pulse 1.5s infinite;}
  .status-dot.released{background:var(--accent);}
  .pay-info{flex:1;min-width:0;}
  .pay-nombre{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pay-meta{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:3px;}
  .pay-id{font-size:10px;font-family:var(--mono);color:var(--border);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pay-amount{font-size:16px;font-weight:800;letter-spacing:-0.5px;color:var(--accent);font-family:var(--mono);flex-shrink:0;}
  .pay-time{font-size:11px;font-family:var(--mono);color:var(--muted);flex-shrink:0;text-align:right;min-width:60px;}
  .btn-release{padding:8px 16px;background:var(--accent);border:none;border-radius:7px;color:#000;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .1s;white-space:nowrap;}
  .btn-release:hover{opacity:.85;}
  .btn-release:active{transform:scale(.97);}
  .btn-released{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:var(--mono);font-size:11px;flex-shrink:0;white-space:nowrap;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--mono);font-size:13px;}
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:.4;}
  .loading{text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:12px;}

  /* TOAST */
  #toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:12px 18px;border-radius:10px;font-family:var(--mono);font-size:13px;z-index:999;display:none;max-width:320px;}

  @media(max-width:600px){
    .main{padding:16px;}
    .payment-card{flex-wrap:wrap;gap:10px;}
    .pay-amount{font-size:14px;}
    .sv-stats{grid-template-columns:1fr 1fr;}
    .topbar{padding:0 16px;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">Pago<span>Check</span></div>
    <div class="login-sub">// confirmación de cobros · Raya Cash</div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="login-name" placeholder="Tu nombre"/>
    </div>
    <div class="form-group">
      <label>Rol</label>
      <select id="login-role">
        <option value="supervisor">Supervisor / Jefe</option>
        <option value="titular">Titular de Cuenta</option>
      </select>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="screen-app">
  <div class="topbar">
    <div class="topbar-logo">Pago<span>Check</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <span class="topbar-role" id="topbar-role"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG SUPABASE ───
const SUPABASE_URL = 'https://xvyjxuzconworfymahaz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qXIe7b5x7ieYZHnJnOmPOA_xjRLFnD6';

// ─── ESTADO ───
let currentUser = null;
let pollInterval = null;
let lastCount = 0;

// ─── SUPABASE API ───
async function sbFetch(path, opts={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`, 'X-Client-Info': 'pagocheck',
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if(!res.ok) throw new Error(await res.text());
  if(res.status === 204) return null;
  return res.json();
}

async function getPagos(){
  return sbFetch('pagos?order=created_at.desc&limit=50');
}

async function updatePago(id, status){
  return sbFetch(`pagos?id=eq.${id}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: { status }
  });
}

// ─── HELPERS ───
function extractImporte(str){
  if(!str) return '—';
  // buscar número en formato $ 1.380.000,00 o similar
  const m = String(str).match(/[\d\.]+,\d{2}/);
  if(m) return '$' + m[0].replace(',00','').replace(/\./g,',');
  return str.length > 30 ? str.substring(0,30)+'…' : str;
}

function formatTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

function formatDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
}

// ─── LOGIN ───
function doLogin(){
  const name = document.getElementById('login-name').value.trim();
  const role = document.getElementById('login-role').value;
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');
  if(!name){ err.style.display='block'; err.textContent='Ingresá tu nombre.'; return; }
  const ok = (role==='supervisor'&&pass==='jefe123')||(role==='titular'&&pass==='titular123');
  if(!ok){ err.style.display='block'; err.textContent='Contraseña incorrecta.'; return; }
  err.style.display='none';
  currentUser = {name, role};
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='flex';
  document.getElementById('topbar-user').textContent = name;
  document.getElementById('topbar-role').textContent = role==='supervisor'?'Supervisor':'Titular de Cuenta';
  renderApp();
}
document.getElementById('login-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function doLogout(){
  currentUser=null;
  if(pollInterval) clearInterval(pollInterval);
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('screen-app').style.display='none';
}

// ─── RENDER ───
function renderApp(){ renderSupervisor(); }

// ─── SUPERVISOR ───
async function renderSupervisor(){
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="sv-stats">
      <div class="stat-card purple">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value purple" id="stat-pending">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Liberados hoy</div>
        <div class="stat-value green" id="stat-released">—</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Total cobros hoy</div>
        <div class="stat-value blue" id="stat-total">—</div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-title">Cobros · Raya Cash</span>
      <span class="live-badge"><span class="live-dot"></span>En vivo</span>
    </div>
    <div class="loading" id="loading-msg">Cargando cobros...</div>
    <div class="payments-list" id="payments-list" style="display:none"></div>
  `;
  await loadAndRender();
  // polling cada 15 segundos
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(loadAndRender, 15000);
}

async function loadAndRender(){
  try {
    const pagos = await getPagos();
    const today = new Date().toDateString();
    const todayPagos = pagos.filter(p => new Date(p.created_at).toDateString() === today);
    const pending  = pagos.filter(p=>p.status==='pending').length;
    const released = todayPagos.filter(p=>p.status==='released').length;

    // actualizar stats
    const sp = document.getElementById('stat-pending');
    const sr = document.getElementById('stat-released');
    const st = document.getElementById('stat-total');
    if(sp) sp.textContent = pending;
    if(sr) sr.textContent = released;
    if(st) st.textContent = todayPagos.length;

    // notificar nuevos pagos
    if(lastCount > 0 && pagos.length > lastCount){
      showToast(`💰 Nuevo cobro recibido · Raya Cash`);
    }
    lastCount = pagos.length;

    // ocultar loading
    const loading = document.getElementById('loading-msg');
    const list = document.getElementById('payments-list');
    if(loading) loading.style.display='none';
    if(list) list.style.display='flex';

    renderList(pagos);
  } catch(e){
    const loading = document.getElementById('loading-msg');
    if(loading) loading.textContent = 'Error al cargar. Reintentando...';
    console.error(e);
  }
}

function renderList(pagos){
  const list = document.getElementById('payments-list');
  if(!list) return;
  if(!pagos.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">💳</div>Sin cobros registrados aún.</div>`;
    return;
  }
  list.innerHTML = pagos.map(p=>`
    <div class="payment-card ${p.status}" id="card-${p.id}">
      <div class="status-dot ${p.status}"></div>
      <div class="pay-info">
        <div class="pay-nombre">${p.nombre_originante||'Raya Cash'}</div>
        <div class="pay-meta">Titular: <strong>${p.titular_email||'—'}</strong></div>
        <div class="pay-id">ID: ${p.identificador||'—'}</div>
      </div>
      <div class="pay-amount">${extractImporte(p.importe)}</div>
      <div class="pay-time">${formatDate(p.created_at)}<br>${formatTime(p.created_at)}</div>
      ${p.status==='pending'
        ? `<button class="btn-release" onclick="releasePayment(${p.id})">✓ Liberar</button>`
        : `<span class="btn-released">✓ Liberado</span>`
      }
    </div>
  `).join('');
}

async function releasePayment(id){
  try {
    await updatePago(id, 'released');
    const card = document.getElementById(`card-${id}`);
    if(card){ card.style.background='rgba(0,229,160,.08)'; }
    await loadAndRender();
    showToast('✅ Mercadería liberada');
  } catch(e){
    showToast('❌ Error al liberar. Reintentá.');
  }
}

// ─── TOAST ───
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{ t.style.display='none'; },4500);
}
</script>
</body>
</html>
